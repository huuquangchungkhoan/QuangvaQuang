name: Daily Screener Data Refresh

on:
  schedule:
    # Run every 30 minutes to get fresh data and avoid API rate limits
    - cron: '*/30 * * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  refresh-screener-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install vnstock boto3 pandas requests
      
      - name: Fetch all data in parallel (screener + funds + companies)
        run: |
          cd $GITHUB_WORKSPACE
          
          # Run all 3 fetches in parallel
          python scripts/fetch_screener.py &
          PID1=$!
          
          python scripts/fetch_funds_hybrid.py &
          PID2=$!
          
          python scripts/fetch_company_vietcap.py &
          PID3=$!
          
          # Wait for all to complete
          wait $PID1
          EXIT1=$?
          
          wait $PID2
          EXIT2=$?
          
          wait $PID3
          EXIT3=$?
          
          # Check if any failed
          if [ $EXIT1 -ne 0 ] || [ $EXIT2 -ne 0 ] || [ $EXIT3 -ne 0 ]; then
            echo "❌ One or more fetches failed:"
            echo "Screener: $EXIT1"
            echo "Funds: $EXIT2"
            echo "Companies: $EXIT3"
            exit 1
          fi
          
          echo "✅ All data fetched successfully!"
      
      - name: Upload to Cloudflare R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_CUSTOM_DOMAIN: ${{ secrets.R2_CUSTOM_DOMAIN }}
        run: |
          cd $GITHUB_WORKSPACE
          python scripts/upload_to_r2.py
      
      - name: Upload artifact (optional backup)
        uses: actions/upload-artifact@v4
        with:
          name: screener-data-${{ github.run_number }}
          path: data/screener.json
          retention-days: 7
