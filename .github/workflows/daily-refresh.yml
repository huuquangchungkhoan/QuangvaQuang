name: Daily Screener Data Refresh

on:
  schedule:
    # Run at 8:00 AM UTC+7 (1:00 AM UTC) every day
    - cron: '0 1 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  refresh-screener-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install vnstock boto3 pandas
      
      - name: Fetch screener data from vnstock
        run: |
          cd $GITHUB_WORKSPACE
          python scripts/fetch_screener.py
      
      - name: Fetch fund data from vnstock
        run: |
          cd $GITHUB_WORKSPACE
          python scripts/fetch_funds.py
      
      - name: Upload to Cloudflare R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_CUSTOM_DOMAIN: ${{ secrets.R2_CUSTOM_DOMAIN }}
        run: |
          cd $GITHUB_WORKSPACE
          python scripts/upload_to_r2.py
      
      - name: Upload artifact (optional backup)
        uses: actions/upload-artifact@v4
        with:
          name: screener-data-${{ github.run_number }}
          path: data/screener.json
          retention-days: 7
